<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juntto | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0080;
            --secondary: #bd82e8;
            --danger: #ff4d4d;
            --success: #2e7d32;
            --success-bg: #e8f5e9;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        /* --- FUNDO DE FLUXO ANIMADO --- */
        .background-flow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #fff, #fce4ec, #e1f5fe, #f3e5f5);
            background-size: 400% 400%;
            z-index: -1;
            animation: fluxo 7s ease infinite;
        }

        @keyframes fluxo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- NAVEGAÇÃO --- */
        .navbar {
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 10%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .nav-links span { margin-left: 30px; cursor: pointer; font-weight: 600; transition: 0.3s; color: #555; font-size: 15px; }
        .nav-links span:hover { color: var(--primary); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .screen { display: none; width: 100%; animation: fadeIn 0.5s ease; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- LOGIN --- */
        .login-box { max-width: 420px; margin: 60px auto; text-align: center; padding: 40px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.08); }
        .app-logo-icon { width: 60px; height: 60px; background: linear-gradient(var(--primary), var(--secondary)); border-radius: 15px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; }

        input, select { width: 100%; padding: 15px; margin: 12px 0; border: 2px solid #f0f0f0; border-radius: 15px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s;}
        input:focus { border-color: var(--secondary); }
        
        .btn-black { background: #000; color: #fff; padding: 15px; border-radius: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-black:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

        .btn-google { background: white; color: #444; border: 2px solid #eee; padding: 14px; border-radius: 30px; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 600; margin-top: 10px; transition: 0.3s;}
        .btn-google:hover { background: #fafafa; }

        /* --- DASHBOARD --- */
        .grid-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .card { background: white; border-radius: 25px; padding: 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); margin-bottom: 25px; position: relative; border: 1px solid rgba(0,0,0,0.02); }
        
        .btn-delete-meta { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-delete-meta:hover { color: var(--danger); }

        .progress-container { background: #f0f0f0; height: 24px; border-radius: 50px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--secondary), var(--primary)); transition: 1.5s cubic-bezier(0.22, 1, 0.36, 1); }

        .user-stat { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f9f9f9; align-items: center;}

        /* --- CONTRIBUIÇÕES DA META --- */
        .meta-contribuicoes {
            background: #fafafa;
            border: 1px solid #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        /* --- MENSAGEM DE PARABÉNS --- */
        .congrats-banner {
            background: var(--success-bg);
            color: var(--success);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            border: 1px solid #c8e6c9;
            animation: fadeIn 0.5s ease;
        }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; width: 400px; text-align: center; }

        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn-action { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="background-flow"></div>

    <nav class="navbar" id="main-nav">
        <div class="logo" style="display: flex; align-items: center; gap: 10px;">
            <div style="background: var(--primary); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px;">
                <i class="fas fa-heart"></i>
            </div>
            <strong style="font-size: 24px; color: var(--primary);">Juntto</strong>
        </div>
        <div class="nav-links">
            <span onclick="navegar('home')">Dashboard</span>
            <span onclick="navegar('historico')">Atividade</span>
            <span onclick="navegar('perfil')">Perfil</span>
            <span onclick="sair()" style="color: var(--danger);">Sair</span>
        </div>
    </nav>

    <div class="container">
        <div id="login" class="screen active">
            <div class="login-box">
                <div class="app-logo-icon"><i class="fas fa-heart"></i></div>
                <h1 style="color: var(--primary); margin: 0; font-size: 28px;">Juntto</h1>
                <p style="color: #666; font-size: 14px; margin-bottom: 30px; font-weight: bold;">Seu dinheiro, juntos.</p>
                
                <input type="email" placeholder="Email">
                <input type="password" placeholder="senha">
                
                <button class="btn-black" style="margin-top: 10px;" onclick="fazerLogin()">Login</button>
                
                <p style="font-size: 14px; color: #333; margin: 20px 0; cursor: pointer;">Esqueci minha senha</p>
                
                <div style="display: flex; align-items: center; gap: 10px; margin: 20px 0;">
                    <hr style="flex:1; opacity: 0.2;"> <span style="color: #666; font-size: 14px;">Ou</span> <hr style="flex:1; opacity: 0.2;">
                </div>

                <button class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="Google">
                    Continuar com o google
                </button>

                <button class="btn-black" style="margin-top: 20px;">Criar nova conta</button>
            </div>
        </div>

        <div id="home" class="screen">
            <div class="grid-layout">
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="margin:0">Meus Objetivos</h2>
                        <button class="btn-black" style="width: auto; padding: 10px 20px; font-size: 14px; background: var(--secondary);" onclick="abrirModalMeta()">+ Nova Meta</button>
                    </div>
                    <div id="metas-container"></div>
                </div>
                <div>
                    <div class="card">
                        <h3 style="margin-top: 0;">Saldos Individuais</h3>
                        <div id="listaSaldos"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="historico" class="screen">
            <div class="card" style="max-width: 800px; margin: 0 auto;">
                <h2>📜 Histórico de Fluxo</h2>
                <div id="listaHistorico"></div>
            </div>
        </div>

        <div id="perfil" class="screen">
            <div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
                <div style="width: 80px; height: 80px; background: #eee; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #ccc;">
                    <i class="fas fa-user"></i>
                </div>
                <h2>Configurações</h2>
                <button class="btn-google">Editar Perfil</button>
                <button class="btn-google">Configurar o App</button>
                <button class="btn-google">Privacidade e Segurança</button>
                <button class="btn-google">Ajuda e Suporte</button>
            </div>
        </div>
    </div>

    <div id="modalTransacao" class="modal">
        <div class="modal-content">
            <h3>Gerenciar Valor</h3>
            <p id="modalSubTitle" style="color: #888;"></p>
            <select id="selectUser">
                <option value="Beatriz">Beatriz</option>
                <option value="Daniel">Daniel</option>
            </select>
            <input type="number" id="valorInput" placeholder="R$ 0,00" step="0.01">
            <div class="btn-group">
                <button class="btn-action" style="background: var(--secondary); color: white;" onclick="processar('deposito')">Depositar</button>
                <button class="btn-action" style="background: #f0f0f0;" onclick="processar('retirada')">Retirar</button>
            </div>
            <button onclick="fecharModais()" style="background:none; border:none; color: #bbb; margin-top: 25px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div id="modalMeta" class="modal">
        <div class="modal-content">
            <h3>Novo Objetivo</h3>
            <input type="text" id="nomeMetaInput" placeholder="Ex: Viagem 2027">
            <input type="number" id="objetivoMetaInput" placeholder="Valor total (Ex: 10000)" step="0.01">
            <button class="btn-black" onclick="criarNovaMeta()">Criar Meta</button>
            <button onclick="fecharModais()" style="background:none; border:none; color: #bbb; margin-top: 20px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
               let dados = JSON.parse(localStorage.getItem('juntto_final_v4')) || {
            usuarios: { "Beatriz": 0, "Daniel": 0 },
            metas: [{ id: Date.now(), nome: "✈️ VIAGEM 2027", total: 0, objetivo: 10000, contribuicoes: { "Beatriz": 0, "Daniel": 0 } }],
            historico: []
        };

        let metaAtiva = null;

        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function fazerLogin() { document.getElementById('main-nav').style.display = 'flex'; navegar('home'); atualizarUI(); }
        function sair() { document.getElementById('main-nav').style.display = 'none'; navegar('login'); }
        function navegar(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        function abrirModalTransacao(idMeta) {
            metaAtiva = idMeta;
            const meta = dados.metas.find(m => m.id === idMeta);
            document.getElementById('modalSubTitle').innerText = meta.nome;
            document.getElementById('modalTransacao').style.display = 'flex';
        }

        function abrirModalMeta() { document.getElementById('modalMeta').style.display = 'flex'; }
        function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function criarNovaMeta() {
            const nome = document.getElementById('nomeMetaInput').value;
            const objetivo = parseFloat(document.getElementById('objetivoMetaInput').value);
            if (!nome || isNaN(objetivo) || objetivo <= 0) return alert("Preencha todos os campos corretamente.");
            
                       dados.metas.push({ id: Date.now(), nome: nome.toUpperCase(), total: 0, objetivo: objetivo, contribuicoes: { "Beatriz": 0, "Daniel": 0 } });
            salvarEAtualizar();
            fecharModais();
            document.getElementById('nomeMetaInput').value = "";
            document.getElementById('objetivoMetaInput').value = "";
        }

        function excluirMeta(id) {
            if (confirm("Deseja excluir esta meta? O dinheiro nela será removido do seu saldo total.")) {
                const metaParaExcluir = dados.metas.find(m => m.id === id);
                
                            if (metaParaExcluir && metaParaExcluir.contribuicoes) {
                    dados.usuarios["Beatriz"] -= (metaParaExcluir.contribuicoes["Beatriz"] || 0);
                    dados.usuarios["Daniel"] -= (metaParaExcluir.contribuicoes["Daniel"] || 0);
                    
                    if (dados.usuarios["Beatriz"] < 0) dados.usuarios["Beatriz"] = 0;
                    if (dados.usuarios["Daniel"] < 0) dados.usuarios["Daniel"] = 0;
                }

                dados.metas = dados.metas.filter(m => m.id !== id);
                salvarEAtualizar();
            }
        }

        function processar(tipo) {
            const valor = parseFloat(document.getElementById('valorInput').value);
            const user = document.getElementById('selectUser').value;
            const meta = dados.metas.find(m => m.id === metaAtiva);

            if (isNaN(valor) || valor <= 0) return alert("Valor inválido.");

                    if (!meta.contribuicoes) meta.contribuicoes = { "Beatriz": 0, "Daniel": 0 };

            if (tipo === 'deposito') {
                meta.total += valor;
                meta.contribuicoes[user] += valor; 
                dados.usuarios[user] += valor;    
                registrar(`Depósito (${meta.nome})`, user, valor, 'green');
            } else {
                if (dados.usuarios[user] < valor) return alert("Saldo individual geral insuficiente.");
                if (meta.total < valor) return alert("Meta sem saldo suficiente.");
                if (meta.contribuicoes[user] < valor) return alert(`Você não pode retirar R$${valor} desta meta, pois você contribuiu apenas com R$${meta.contribuicoes[user]}.`);

                meta.total -= valor;
                meta.contribuicoes[user] -= valor; 
                dados.usuarios[user] -= valor;     
                registrar(`Retirada (${meta.nome})`, user, valor, 'red');
            }
            salvarEAtualizar();
            fecharModais();
            document.getElementById('valorInput').value = "";
        }

        function registrar(acao, nome, valor, cor) {
            dados.historico.unshift({ texto: `${acao} - ${nome}`, valor: valor, cor: cor, data: new Date().toLocaleDateString('pt-BR') });
        }

        function salvarEAtualizar() {
            localStorage.setItem('juntto_final_v4', JSON.stringify(dados));
            atualizarUI();
        }

        function atualizarUI() {
            let htmlMetas = "";
            dados.metas.forEach(m => {
                const porc = Math.min((m.total / m.objetivo) * 100, 100).toFixed(1);
                
                let parabensHtml = "";
                if (m.total >= m.objetivo) {
                    parabensHtml = `
                        <div class="congrats-banner">
                            🎉 Parabéns! Vocês atingiram a meta e já podem realizar o que queriam!
                        </div>
                    `;
                }

                const contB = m.contribuicoes?.Beatriz || 0;
                const contD = m.contribuicoes?.Daniel || 0;

                htmlMetas += `
                    <div class="card">
                        <button class="btn-delete-meta" onclick="excluirMeta(${m.id})"><i class="fas fa-trash-alt"></i></button>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h2 style="margin:0">${m.nome}</h2>
                            <span style="color: var(--primary); font-weight: bold; font-size: 14px;">Juntto</span>
                        </div>
                        
                        ${parabensHtml}

                        <div class="progress-container"><div class="progress-bar" style="width: ${porc}%"></div></div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <strong>R$ ${formatarMoeda(m.total)}</strong>
                            <span style="color: #888; font-size: 14px;">${porc}% de R$ ${formatarMoeda(m.objetivo)}</span>
                        </div>

                        <div class="meta-contribuicoes">
                            <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px;">
                                <span>👩 Beatriz</span>
                                <strong>R$ ${formatarMoeda(contB)}</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                                <span>👨 Daniel</span>
                                <strong>R$ ${formatarMoeda(contD)}</strong>
                            </div>
                        </div>

                        <button class="btn-black" style="background: var(--secondary); padding: 12px; border-radius: 10px;" onclick="abrirModalTransacao(${m.id})">Gerenciar</button>
                    </div>`;
            });
            document.getElementById('metas-container').innerHTML = htmlMetas || '<p style="text-align:center; color:#999">Nenhuma meta criada.</p>';

            let htmlSaldos = "";
            for (let u in dados.usuarios) {
                htmlSaldos += `
                    <div class="user-stat">
                        <span>${u === 'Beatriz' ? '👩' : '👨'} <strong style="margin-left:5px">${u}</strong></span>
                        <span style="color: #555;">R$ ${formatarMoeda(dados.usuarios[u])}</span>
                    </div>`;
            }
            document.getElementById('listaSaldos').innerHTML = htmlSaldos;

            let htmlHist = "";
            dados.historico.forEach(item => {
                htmlHist += `<div class="user-stat"><span>${item.data} - ${item.texto}</span><b style="color: ${item.cor}">${item.cor === 'green' ? '+' : '-'} R$ ${formatarMoeda(item.valor)}</b></div>`;
            });
            document.getElementById('listaHistorico').innerHTML = htmlHist || '<p style="color:#bbb; text-align:center">Sem atividades.</p>';
        }
    </script>
</body>
</html>
